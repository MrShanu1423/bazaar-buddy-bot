kind = "api"
previewPath = "/"
title = "Bazaar Buddy Bot"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "Bazaar Buddy Bot"
paths = ["/", "/api"]

[services.env]
PORT = "8080"

[services.development]
run = "bash -lc 'cd /home/runner/workspace && python app.py'"

[services.production]

[services.production.build]
args = ["bash", "-lc", "uv pip install --system flask requests beautifulsoup4 || pip install flask requests beautifulsoup4"]

[services.production.run]
args = ["bash", "-lc", "cd /home/runner/workspace && python app.py"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
